<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel4.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* BACKGROUND OVERLAY */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.75);
  z-index: -1;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.7);
}

nav img {
  width: 40px;
  border-radius: 50%;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('hotel2.JPG') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  text-align: center;
  border-radius: 10px;
}

.btn {
  background: #d4af37;
  padding: 12px 25px;
  border-radius: 25px;
  color: black;
  text-decoration: none;
}

/* SECTION */
.section {
  padding: 60px;
  text-align: center;
}

/* ROOMS */
.rooms {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.room {
  flex: 1;
  min-width: 250px;
  background: rgba(19,44,92,0.85);
  padding: 15px;
  border-radius: 10px;
}

.room img {
  width: 100%;
  border-radius: 10px;
}
</style>

</head>

<body>

<!-- NAV WITH LOGO -->
<nav>
  <div style="display: flex; align-items: center; gap: 10px;">
    <img src="hlogo.png">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">gallery</a>
  </div>
</nav>

<!-- HERO -->
<header class="hero">
  <div class="overlay">
    <h1>Experience Luxury</h1>
    <p>Comfort meets elegance in Port Harcourt</p>
    <a href="booking.html" class="btn">Book Now</a>
  </div>
</header>

<!-- SECTION -->
<section class="section">
  <h2>Our Facilities</h2>

  <div class="rooms">
    <div class="room">
      <img src="room.JPG">
      <h3>Luxury Room</h3>
    </div>

    <div class="room">
      <img src="vipbar.JPG">
      <h3>VIP Bar</h3>
    </div>

    <div class="room">
      <img src="lobby.JPG">
      <h3>Lobby</h3>
    </div>
  </div>
</section>

</body>
</html>
