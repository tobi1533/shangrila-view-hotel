<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Room - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel8.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -2;
}

/* ANIMATED BACKGROUND GLOW */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(196, 30, 58, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(31, 59, 111, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(196, 30, 58, 0.05) 0%, transparent 50%);
  z-index: -1;
  animation: ambientGlow 8s ease-in-out infinite;
}

@keyframes ambientGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(31,59,111,0.6) 100%);
  position: relative;
  backdrop-filter: blur(10px);
  border-bottom: 3px solid #C41E3A;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 1000;
}

nav img {
  width: 65px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(196, 30, 58, 0.6);
  transition: all 0.3s ease;
}

nav img:hover {
  transform: scale(1.1) rotate(5deg);
  box-shadow: 0 0 30px rgba(196, 30, 58, 0.9);
}

nav h2 {
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

nav > div:first-child {
  display: flex;
  align-items: center;
  gap: 10px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
}

nav a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #C41E3A;
  transition: width 0.3s ease;
}

nav a:hover {
  color: #C41E3A;
  transform: translateY(-2px);
}

nav a:hover::after {
  width: 100%;
}

/* HAMBURGER */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: #C41E3A;
  transition: all 0.3s ease;
}

.menu-toggle:hover {
  transform: scale(1.2) rotate(90deg);
}

/* NAV LINKS */
.nav-links {
  display: flex;
  align-items: center;
  gap: 0;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 80px;
    right: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(31,59,111,0.9) 100%);
    flex-direction: column;
    width: 220px;
    display: none;
    padding: 20px;
    border-left: 3px solid #C41E3A;
    backdrop-filter: blur(10px);
    z-index: 1001;
  }

  .nav-links a {
    margin: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}

.form-box {
  background: linear-gradient(135deg, rgba(31, 59, 111, 0.9) 0%, rgba(0, 0, 0, 0.85) 100%);
  padding: 50px;
  border-radius: 20px;
  width: 100%;
  max-width: 450px;
  border: 2px solid rgba(196, 30, 58, 0.3);
  box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(15px);
  animation: slideUp 0.8s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.form-box:hover {
  border-color: rgba(196, 30, 58, 0.6);
  box-shadow: 0 25px 70px rgba(196, 30, 58, 0.2);
}

.form-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 30px;
  letter-spacing: 1px;
}

input, textarea, select {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border-radius: 10px;
  border: 2px solid rgba(196, 30, 58, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  transition: all 0.3s ease;
}

input::placeholder, textarea::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #C41E3A;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 15px rgba(196, 30, 58, 0.3);
}

select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 20px;
  padding-right: 40px;
}

select option {
  background: #1F3B6F;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  border: none;
  border-radius: 25px;
  color: white;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(196, 30, 58, 0.3);
  margin-top: 10px;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 50px rgba(196, 30, 58, 0.5);
}

button:active {
  transform: translateY(-1px);
}

.whatsapp-btn {
  display: block;
  text-align: center;
  margin-top: 20px;
  padding: 14px;
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
  color: white;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
}

.whatsapp-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 50px rgba(37, 211, 102, 0.5);
}

.whatsapp-btn:active {
  transform: translateY(-1px);
}

.divider {
  text-align: center;
  margin: 20px 0;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
}

@media (max-width: 768px) {
  .form-box {
    padding: 30px;
    max-width: 100%;
  }

  .form-box h2 {
    font-size: 28px;
  }

  nav {
    padding: 15px 20px;
  }

  nav a {
    display: none;
  }
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="hlogo.png" alt="Logo">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </div>
</nav>

<!-- BOOKING FORM -->
<div class="container">
  <div class="form-box">
    <h2>Book Your Stay</h2>

    <form action="https://formspree.io/f/maqlpaqk" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>

      <select name="room" required>
        <option value="">Select Room Type</option>
        <option>Luxury Room</option>
        <option>VIP Room</option>
        <option>Standard Room</option>
      </select>

      <input type="date" name="checkin" placeholder="Check-in Date" required>
      <input type="date" name="checkout" placeholder="Check-out Date" required>

      <textarea name="message" placeholder="Additional Message" rows="4"></textarea>

      <button type="submit">Reserve Now</button>
    </form>

    <div class="divider">OR</div>

    <a href="https://wa.me/2348110844173" class="whatsapp-btn">📱 Book via WhatsApp</a>
  </div>
</div>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  const navLinks = document.getElementById("navLinks");
  navLinks.classList.toggle("active");
}

// Close menu when a link is clicked
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById("navLinks").classList.remove("active");
  });
});
</script>

</body>
        </html>
