<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Room - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvcC5ysf6JpJlwmUJBEvXZBl-NSiVD7pw",
  authDomain: "shangrilaviewhotel-d0b66.firebaseapp.com",
  projectId: "shangrilaviewhotel-d0b66"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// CHECK LOGIN
auth.onAuthStateChanged(user => {
  if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
  }
});

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel8.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.7);
}

/* ✅ LOGO FIX (consistent across all pages) */
nav img {
  width: 65px;
  height: auto;
  border-radius: 50%;
  display: block;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* FORM CONTAINER */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* FORM BOX */
.form-box {
  background: rgba(19,44,92,0.9);
  padding: 40px;
  border-radius: 15px;
  width: 350px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.form-box h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUTS */
input, textarea, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-family: 'Poppins', sans-serif;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #d4af37;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #facc15;
  transform: scale(1.05);
}

/* WHATSAPP BUTTON */
.whatsapp-btn {
  display: block;
  text-align: center;
  margin-top: 15px;
  padding: 12px;
  background: #25D366;
  color: white;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.whatsapp-btn:hover {
  background: #1ebe5d;
  transform: scale(1.03);
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="hlogo.png" alt="Hotel Logo">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
<a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<!-- FORM -->
<div class="container">
  <div class="form-box">
    <h2>Book Your Stay</h2>

    <form action="https://formspree.io/f/maqlpaqk" method="POST">

      <input type="text" name="name" placeholder="Full Name" required>

      <input type="email" name="email" placeholder="Email Address" required>

      <input type="tel" name="phone" placeholder="Phone Number" required>

      <label>Room Type</label>
      <select name="room" required>
        <option value="">Select Room Type</option>
        <option>Luxury Room</option>
        <option>VIP Room</option>
        <option>Standard Room</option>
      </select>

      <label>Check-in</label>
      <input type="date" name="checkin" required>

      <label>Check-out</label>
      <input type="date" name="checkout" required>

      <textarea name="message" placeholder="Additional Message (optional)"></textarea>

      <button type="submit">Reserve Now</button>

    </form>

    <!-- WHATSAPP QUICK BOOK -->
    <a href="https://wa.me/2348110844173" class="whatsapp-btn" target="_blank">
      Book via WhatsApp
    </a>

  </div>
</div>

</body>
</html>
