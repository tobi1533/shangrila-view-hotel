<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Room - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ===== ROOT COLOR VARIABLES ===== */
:root {
  --primary: #C41E3A;
  --primary-dark: #8B1527;
  --secondary: #1F3B6F;
  --accent: #D4AF37;
  --light: #F5F1E8;
  --dark: #0a0e1a;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-hover: rgba(255, 255, 255, 0.15);
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: url('hotel8.JPG') no-repeat center center fixed;
  background-size: cover;
  background-attachment: fixed;
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* ===== MULTI-LAYERED BACKGROUND ===== */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 10% 20%, rgba(196, 30, 58, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(31, 59, 111, 0.15) 0%, transparent 40%),
    linear-gradient(180deg, rgba(5, 10, 30, 0.8) 0%, rgba(5, 10, 30, 0.9) 100%);
  top: 0;
  left: 0;
  z-index: -2;
}

/* ===== LIVING AMBIENT EFFECT ===== */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(196, 30, 58, 0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(31, 59, 111, 0.1) 0%, transparent 50%);
  z-index: -1;
  animation: ambientPulse 12s ease-in-out infinite;
  pointer-events: none;
}

@keyframes ambientPulse {
  0%, 100% { 
    opacity: 0.6;
    filter: blur(0px);
  }
  50% { 
    opacity: 1;
    filter: blur(1px);
  }
}

/* ===== NAV WITH 5D GLASS MORPHISM ===== */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: var(--glass);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 2px solid rgba(212, 175, 55, 0.3);
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  z-index: 1000;
  animation: slideInDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
    backdrop-filter: blur(0px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    backdrop-filter: blur(20px);
  }
}

nav img {
  width: 65px;
  border-radius: 50%;
  box-shadow: 
    0 0 30px rgba(196, 30, 58, 0.6),
    0 0 60px rgba(212, 175, 55, 0.3),
    inset 0 0 20px rgba(255, 255, 255, 0.2);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 3px solid rgba(212, 175, 55, 0.4);
}

nav img:hover {
  transform: scale(1.15) rotate(8deg);
  box-shadow: 
    0 0 50px rgba(196, 30, 58, 0.9),
    0 0 80px rgba(212, 175, 55, 0.5),
    inset 0 0 20px rgba(255, 255, 255, 0.3);
  filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6));
}

nav h2 {
  background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 50%, var(--light) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  letter-spacing: 1px;
  font-weight: 900;
  margin: 0;
}

nav > div:first-child {
  display: flex;
  align-items: center;
  gap: 15px;
}

nav a {
  color: white;
  margin-left: 0;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
  font-weight: 500;
  text-transform: uppercase;
  font-size: 12px;
  letter-spacing: 1px;
}

nav a::before {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--primary));
  transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 15px rgba(196, 30, 58, 0.6);
}

nav a:hover {
  color: var(--accent);
  transform: translateY(-3px);
}

nav a:hover::before {
  width: 100%;
}

/* ===== HAMBURGER MENU - FIXED Z-INDEX ===== */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: var(--accent);
  transition: all 0.3s ease;
  text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
  position: relative;
  z-index: 1001;
}

.menu-toggle:hover {
  transform: scale(1.25) rotate(90deg);
  text-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
}

/* ===== NAV LINKS ===== */
.nav-links {
  display: flex;
  align-items: center;
  gap: 30px;
}

/* ===== MOBILE MENU - PROPER Z-INDEX ===== */
@media (max-width: 768px) {
  nav {
    padding: 15px 20px;
  }

  nav a {
    display: none;
  }

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: fixed;
    top: 70px;
    right: 0;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    flex-direction: column;
    width: 220px;
    display: none;
    padding: 20px;
    border-left: 3px solid var(--accent);
    z-index: 1001;
    box-shadow: -10px 10px 40px rgba(0, 0, 0, 0.5);
    gap: 0;
    animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideInRight {
    from {
      opacity: 0;
      transform: translateX(50px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .nav-links a {
    margin: 15px 0 !important;
    color: white;
    text-decoration: none;
    display: block;
    padding: 10px;
    border-radius: 8px;
    transition: all 0.3s ease;
  }

  .nav-links a:hover {
    background: rgba(212, 175, 55, 0.1);
  }

  .nav-links.active {
    display: flex !important;
  }
}

/* ===== CONTAINER ===== */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 100px 20px 40px 20px;
  position: relative;
  z-index: 1;
}

/* ===== FORM BOX WITH 5D GLASS MORPHISM ===== */
.form-box {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 60px 50px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  border: 2px solid rgba(212, 175, 55, 0.3);
  box-shadow: 
    0 25px 70px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  animation: slideUpScale 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

@keyframes slideUpScale {
  from {
    opacity: 0;
    transform: translateY(50px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.form-box::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
  animation: rotate 20s linear infinite;
  pointer-events: none;
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.form-box:hover {
  border-color: var(--accent);
  box-shadow: 
    0 35px 90px rgba(196, 30, 58, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.15);
}

.form-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 50%, white 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 35px;
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
}

/* ===== FORM INPUTS ===== */
input, textarea, select {
  width: 100%;
  padding: 14px 16px;
  margin: 14px 0;
  border-radius: 12px;
  border: 2px solid rgba(212, 175, 55, 0.3);
  background: rgba(255, 255, 255, 0.08);
  color: white;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 1;
}

input::placeholder, textarea::placeholder {
  color: rgba(255, 255, 255, 0.5);
  font-weight: 300;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.12);
  box-shadow: 
    0 0 25px rgba(212, 175, 55, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  transform: translateY(-2px);
}

select {
  cursor: pointer;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23D4AF37' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 20px;
  padding-right: 40px;
  background-color: rgba(255, 255, 255, 0.08);
}

select option {
  background: var(--secondary);
  color: white;
  font-weight: 500;
}

/* ===== BUTTONS ===== */
button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border: none;
  border-radius: 30px;
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 
    0 15px 40px rgba(196, 30, 58, 0.4),
    0 0 30px rgba(196, 30, 58, 0.2);
  margin-top: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
  transition: left 0.5s ease;
}

button:hover::before {
  left: 100%;
}

button:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 
    0 25px 60px rgba(196, 30, 58, 0.6),
    0 0 50px rgba(212, 175, 55, 0.4);
  border-color: var(--accent);
}

button:active {
  transform: translateY(-2px) scale(1.02);
}

/* ===== WHATSAPP BUTTON ===== */
.whatsapp-btn {
  display: block;
  text-align: center;
  margin-top: 20px;
  padding: 16px;
  background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
  color: white;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 
    0 15px 40px rgba(37, 211, 102, 0.4),
    0 0 30px rgba(37, 211, 102, 0.2);
  position: relative;
  z-index: 1;
  text-transform: uppercase;
  letter-spacing: 1px;
  overflow: hidden;
}

.whatsapp-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s ease;
}

.whatsapp-btn:hover::before {
  left: 100%;
}

.whatsapp-btn:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 
    0 25px 60px rgba(37, 211, 102, 0.6),
    0 0 50px rgba(37, 211, 102, 0.4);
}

.whatsapp-btn:active {
  transform: translateY(-2px) scale(1.02);
}

/* ===== DIVIDER ===== */
.divider {
  text-align: center;
  margin: 25px 0;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.5);
  font-weight: 600;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
}

.divider::before,
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 45%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), transparent);
}

.divider::before {
  left: 0;
}

.divider::after {
  right: 0;
}

/* ===== SMOOTH SCROLLBAR ===== */
::-webkit-scrollbar {
  width: 12px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--primary), var(--accent));
  border-radius: 6px;
  box-shadow: 0 0 15px rgba(196, 30, 58, 0.4);
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, var(--accent), var(--primary));
  box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .container {
    padding: 100px 15px 30px 15px;
  }

  .form-box {
    padding: 40px 25px;
    max-width: 100%;
  }

  .form-box h2 {
    font-size: 32px;
    margin-bottom: 25px;
  }

  input, textarea, select {
    padding: 12px 14px;
    margin: 10px 0;
  }

  button,
  .whatsapp-btn {
    padding: 14px;
    font-size: 14px;
  }
}

</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="hlogo.png" alt="Logo">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </div>
</nav>

<!-- BOOKING FORM -->
<div class="container">
  <div class="form-box">
    <h2>Book Your Stay</h2>

    <form action="https://formspree.io/f/maqlpaqk" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>

      <select name="room" required>
        <option value="">Select Room Type</option>
        <option>Luxury Room</option>
        <option>VIP Room</option>
        <option>Standard Room</option>
      </select>

      <input type="date" name="checkin" placeholder="Check-in Date" required>
      <input type="date" name="checkout" placeholder="Check-out Date" required>

      <textarea name="message" placeholder="Additional Message" rows="4"></textarea>

      <button type="submit">Reserve Now</button>
    </form>

    <div class="divider">OR</div>

    <a href="https://wa.me/2348110844173" class="whatsapp-btn">📱 Book via WhatsApp</a>
  </div>
</div>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  const navLinks = document.getElementById("navLinks");
  navLinks.classList.toggle("active");
}

// Close menu when a link is clicked
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById("navLinks").classList.remove("active");
  });
});
</script>

</body>
</html>
