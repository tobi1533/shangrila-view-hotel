<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvcC5ysf6JpJlwmUJBEvXZBl-NSiVD7pw",
  authDomain: "shangrilaviewhotel-d0b66.firebaseapp.com",
  projectId: "shangrilaviewhotel-d0b66"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel12.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.7);
  position: relative;
}

nav img {
  width: 70px;
  border-radius: 50%;
}

nav div:first-child {
  display: flex;
  align-items: center;
  gap: 12px;
}

nav a {
  color: white;
  text-decoration: none;
}

/* HAMBURGER */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
}

/* NAV LINKS */
.nav-links {
  display: flex;
  align-items: center;
}

.nav-links a,
.nav-links span {
  margin-left: 20px;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 80px;
    right: 0;
    background: rgba(0,0,0,0.95);
    flex-direction: column;
    width: 220px;
    display: none;
    padding: 20px;
  }

  .nav-links a,
  .nav-links span {
    margin: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }
}

/* CONTAINER */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  padding: 60px 20px;
}

/* BOXES */
.info-box, .form-box {
  background: rgba(19,44,92,0.9);
  padding: 30px;
  border-radius: 15px;
}

.info-box { width: 300px; }
.form-box { width: 350px; }

.contact-icons {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.icon-btn {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #d4af37;
  text-decoration: none;
  font-size: 22px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #d4af37;
  border: none;
  border-radius: 25px;
}

.btn {
  background: #d4af37;
  padding: 12px 25px;
  border-radius: 25px;
  color: black;
  text-decoration: none;
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div>
    <img src="hlogo.png">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>

    <span id="userEmail"></span>

    <a href="login.html" id="loginLink">Login</a>
    <a href="#" onclick="logout()" id="logoutLink" style="display:none;">Logout</a>
  </div>
</nav>

<!-- CONTACT -->
<div class="container">

  <div class="info-box">
    <h2>Contact Us</h2>
    <p>Tap any icon to reach us instantly</p>

    <div class="contact-icons">
      <a href="tel:+2348110844173" class="icon-btn">📞</a>
      <a href="https://wa.me/2348110844173" class="icon-btn" target="_blank">💬</a>
      <a href="mailto:shangrilaviewhotel@gmail.com" class="icon-btn">✉️</a>
    </div>

    <p style="margin-top:20px;"><strong>Location:</strong> Port Harcourt</p>
  </div>

  <div class="form-box">
    <h2>Send Us a Message</h2>

    <form action="https://formspree.io/f/maqlpaqk" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Write your message..." required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

</div>

<!-- MAP -->
<section style="padding:60px 20px; text-align:center;">
  <h2>Find Us</h2>
  <p>Tap below for directions</p>

  <div style="max-width:900px; margin:20px auto; border-radius:15px; overflow:hidden;">
    
    <iframe 
      src="https://maps.google.com/maps?q=4.9003557,6.9616708&z=17&output=embed"
      width="100%" 
      height="300" 
      style="border:0;">
    </iframe>

    <br><br>

    <a href="https://www.google.com/maps?q=4.9003557,6.9616708" target="_blank" class="btn">
      Open in Google Maps
    </a>

  </div>
</section>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

auth.onAuthStateChanged(user => {
  const userEmail = document.getElementById("userEmail");
  const loginLink = document.getElementById("loginLink");
  const logoutLink = document.getElementById("logoutLink");

  if (user) {
    userEmail.textContent = user.email;
    loginLink.style.display = "none";
    logoutLink.style.display = "inline";
  } else {
    userEmail.textContent = "";
    loginLink.style.display = "inline";
    logoutLink.style.display = "none";
  }
});

function logout() {
  auth.signOut().then(() => {
    alert("Logged out");
    window.location.href = "login.html";
  });
}
</script>

</body>
  </html>
