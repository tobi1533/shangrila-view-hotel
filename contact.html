<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel12.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -2;
}

/* ANIMATED BACKGROUND GLOW */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(196, 30, 58, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(31, 59, 111, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(196, 30, 58, 0.05) 0%, transparent 50%);
  z-index: -1;
  animation: ambientGlow 8s ease-in-out infinite;
}

@keyframes ambientGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(31,59,111,0.6) 100%);
  position: relative;
  backdrop-filter: blur(10px);
  border-bottom: 3px solid #C41E3A;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 1000;
}

nav img {
  width: 70px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(196, 30, 58, 0.6);
  transition: all 0.3s ease;
}

nav img:hover {
  transform: scale(1.1) rotate(5deg);
  box-shadow: 0 0 30px rgba(196, 30, 58, 0.9);
}

nav h2 {
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

nav div:first-child {
  display: flex;
  align-items: center;
  gap: 12px;
}

nav a {
  color: white;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
}

nav a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #C41E3A;
  transition: width 0.3s ease;
}

nav a:hover {
  color: #C41E3A;
  transform: translateY(-2px);
}

nav a:hover::after {
  width: 100%;
}

/* HAMBURGER */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: #C41E3A;
  transition: all 0.3s ease;
}

.menu-toggle:hover {
  transform: scale(1.2) rotate(90deg);
}

/* NAV LINKS */
.nav-links {
  display: flex;
  align-items: center;
}

.nav-links a {
  margin-left: 20px;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 80px;
    right: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(31,59,111,0.9) 100%);
    flex-direction: column;
    width: 220px;
    display: none;
    padding: 20px;
    border-left: 3px solid #C41E3A;
    backdrop-filter: blur(10px);
    z-index: 1001;
  }

  .nav-links a {
    margin: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }
}

/* CONTAINER */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  padding: 60px 20px;
  position: relative;
  z-index: 1;
}

/* BOXES */
.info-box, .form-box {
  background: linear-gradient(135deg, rgba(31, 59, 111, 0.9) 0%, rgba(0, 0, 0, 0.85) 100%);
  padding: 30px;
  border-radius: 15px;
  border: 2px solid rgba(196, 30, 58, 0.3);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}

.info-box {
  width: 300px;
}

.form-box {
  width: 350px;
}

.info-box:hover, .form-box:hover {
  border-color: rgba(196, 30, 58, 0.6);
  box-shadow: 0 15px 50px rgba(196, 30, 58, 0.2);
}

.info-box h2, .form-box h2 {
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 15px;
}

.contact-icons {
  display: flex;
  gap: 15px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.icon-btn {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  text-decoration: none;
  font-size: 22px;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
}

.icon-btn:hover {
  transform: translateY(-5px) scale(1.1);
  box-shadow: 0 10px 30px rgba(196, 30, 58, 0.5);
}

/* ✅ SOCIAL ICONS */
.social-icons {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.social-icons a img {
  width: 40px;
  height: 40px;
  transition: all 0.3s ease;
}

.social-icons a:hover img {
  transform: scale(1.2);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 2px solid rgba(196, 30, 58, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: white;
  font-family: 'Poppins', sans-serif;
  transition: all 0.3s ease;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #C41E3A;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 10px rgba(196, 30, 58, 0.3);
}

input::placeholder, textarea::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  border: none;
  border-radius: 25px;
  color: white;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(196, 30, 58, 0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(196, 30, 58, 0.5);
}

button:active {
  transform: translateY(0);
}

/* MAP SECTION */
.map-section {
  padding: 60px 20px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.map-section h2 {
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.map-section p {
  color: #C41E3A;
  margin-bottom: 20px;
  font-weight: 600;
}

.map-container {
  max-width: 900px;
  margin: 20px auto;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
  transition: all 0.3s ease;
}

.map-container:hover {
  box-shadow: 0 30px 70px rgba(196, 30, 58, 0.2);
}

.map-container a {
  display: block;
  text-decoration: none;
}

.map-container iframe {
  width: 100%;
  height: 300px;
  border: none;
  display: block;
}
</style>

</head>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  const navLinks = document.getElementById("navLinks");
  navLinks.classList.toggle("active");
}

// Close menu when a link is clicked
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById("navLinks").classList.remove("active");
  });
});
</script>
