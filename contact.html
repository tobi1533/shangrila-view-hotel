<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel12.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.7);
}

nav img {
  width: 40px;
  border-radius: 50%;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* CONTAINER */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 40px;
  padding: 60px 20px;
}

/* CONTACT INFO */
.info-box {
  background: rgba(19,44,92,0.9);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
}

.info-box h2 {
  margin-bottom: 20px;
}

.info-box p {
  margin: 10px 0;
}

/* FORM */
.form-box {
  background: rgba(19,44,92,0.9);
  padding: 30px;
  border-radius: 15px;
  width: 350px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: #d4af37;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #facc15;
  transform: scale(1.05);
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="hlogo.png">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- CONTACT SECTION -->
<div class="container">

  <!-- CONTACT DETAILS -->
  <div class="info-box">
    <h2>Contact Information</h2>

    <p><strong>Phone:</strong> +234 08110844173</p>

    <p><strong>Email:</strong> shangrilaviewhotel@gmail.com</p>

    <p><strong>WhatsApp:</strong> +234 08110844173</p>

    <p><strong>Instagram:</strong> @shangrilaviewhotel</p>

    <p><strong>Location:</strong> Port Harcourt, Rivers State</p>
  </div>

  <!-- MESSAGE FORM -->
  <div class="form-box">
    <h2>Send Us a Message</h2>

    <!-- CONNECTED TO YOUR GMAIL -->
    <form action="https://formspree.io/f/maqlpaqk" method="POST">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" placeholder="Write your message..." required></textarea>

      <button type="submit">Send Message</button>

    </form>
  </div>

</div>

</body>
         </html>
