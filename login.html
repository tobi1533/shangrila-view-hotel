<!DOCTYPE html>
<html>
<head>
<title>Login - Shangri-La</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0a1f44, #132c5c);
  color: white;
}

.container {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  font-family: 'Poppins', sans-serif;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  border: none;
}

.signup-btn {
  background: transparent;
  border: 1px solid white;
  color: white;
}

.signup-btn:hover {
  background: white;
  color: black;
}

.login-btn {
  background: #d4af37;
}

.login-btn:hover {
  background: #facc15;
  transform: scale(1.05);
}

.google-btn {
  background: #fff;
  color: #000;
}
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="signup-btn" onclick="signup()">Sign Up</button>
<button class="login-btn" onclick="login()">Login</button>

<!-- Google Login -->
<button class="google-btn" onclick="googleLogin()">Continue with Google</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvcC5ysf6JpJlwmUJBEvXZBl-NSiVD7pw",
  authDomain: "shangrilaviewhotel-d0b66.firebaseapp.com",
  projectId: "shangrilaviewhotel-d0b66"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGN UP
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created"))
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful");
      window.location.href = "booking.html";
    })
    .catch(e => alert(e.message));
}

// GOOGLE LOGIN (redirect method for mobile)
function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

// HANDLE LOGIN RESULT (CORRECT METHOD)
firebase.auth().onAuthStateChanged(function(user) {
  if (user) {
    alert("Welcome " + user.displayName);
    window.location.href = "booking.html";
  }
});
</script>

</body>
</html>
