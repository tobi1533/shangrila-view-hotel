
<!DOCTYPE html>
<html>
<head>
<title>Login - Shangri-La</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvcC5ysf6JpJlwmUJBEvXZBl-NSiVD7pw",
  authDomain: "shangrilaviewhotel-d0b66.firebaseapp.com",
  projectId: "shangrilaviewhotel-d0b66"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGN UP
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Account created"))
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      alert("Login successful");
      window.location.href = "booking.html"; // redirect
    })
    .catch(e => alert(e.message));
}
</script>

</body>
</html>
