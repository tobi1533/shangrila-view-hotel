<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvcC5ysf6JpJlwmUJBEvXZBl-NSiVD7pw",
  authDomain: "shangrilaviewhotel-d0b66.firebaseapp.com",
  projectId: "shangrilaviewhotel-d0b66"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel10.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -1;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.7);
  position: relative;
}

nav img {
  width: 65px;
  border-radius: 50%;
}

nav div:first-child {
  display: flex;
  align-items: center;
  gap: 10px;
}

nav a {
  color: white;
  text-decoration: none;
}

/* HAMBURGER */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
}

/* NAV LINKS */
.nav-links {
  display: flex;
  align-items: center;
}

.nav-links a,
.nav-links span {
  margin-left: 20px;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 80px;
    right: 0;
    background: rgba(0,0,0,0.95);
    flex-direction: column;
    width: 220px;
    display: none;
    padding: 20px;
  }

  .nav-links a,
  .nav-links span {
    margin: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }
}

/* TITLE */
.title {
  text-align: center;
  margin-top: 40px;
}

.title h1 {
  font-size: 40px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.4s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div>
    <img src="hlogo.png">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>

    <span id="userEmail"></span>

    <a href="login.html" id="loginLink">Login</a>
    <a href="#" onclick="logout()" id="logoutLink" style="display:none;">Logout</a>
  </div>
</nav>

<!-- TITLE -->
<div class="title">
  <h1>Our Gallery</h1>
  <p>Explore the beauty of Shangri-La View Hotel</p>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="hotelEN.jpg">
  <img src="hotel4.JPG">
  <img src="hotel5.JPG">
  <img src="hotel7.JPG">
  <img src="hotel8.JPG">
  <img src="hotel10.JPG">
  <img src="hlogo.png">
  <img src="hotel14.JPG">
  <img src="hotelFVV.jpg">
</div>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

auth.onAuthStateChanged(user => {
  const userEmail = document.getElementById("userEmail");
  const loginLink = document.getElementById("loginLink");
  const logoutLink = document.getElementById("logoutLink");

  if (user) {
    userEmail.textContent = user.email;
    loginLink.style.display = "none";
    logoutLink.style.display = "inline";
  } else {
    userEmail.textContent = "";
    loginLink.style.display = "inline";
    logoutLink.style.display = "none";
  }
});

function logout() {
  auth.signOut().then(() => {
    alert("Logged out");
    window.location.href = "login.html";
  });
}
</script>

</body>
</html>
