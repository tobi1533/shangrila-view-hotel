<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Shangri-La View Hotel</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('hotel10.JPG') no-repeat center center fixed;
  background-size: cover;
  color: white;
  overflow-x: hidden;
}

/* OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(5,10,30,0.85);
  top: 0;
  left: 0;
  z-index: -2;
}

/* ANIMATED BACKGROUND GLOW */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(196, 30, 58, 0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(31, 59, 111, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(196, 30, 58, 0.05) 0%, transparent 50%);
  z-index: -1;
  animation: ambientGlow 8s ease-in-out infinite;
}

@keyframes ambientGlow {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(31,59,111,0.6) 100%);
  position: relative;
  backdrop-filter: blur(10px);
  border-bottom: 3px solid #C41E3A;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  z-index: 1000;
}

nav img {
  width: 65px;
  border-radius: 50%;
  box-shadow: 0 0 20px rgba(196, 30, 58, 0.6);
  transition: all 0.3s ease;
}

nav img:hover {
  transform: scale(1.1) rotate(5deg);
  box-shadow: 0 0 30px rgba(196, 30, 58, 0.9);
}

nav h2 {
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

nav div:first-child {
  display: flex;
  align-items: center;
  gap: 10px;
}

nav a {
  color: white;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
}

nav a::after {
  content: '';
  position: absolute;
  bottom: -5px;
  left: 0;
  width: 0;
  height: 2px;
  background: #C41E3A;
  transition: width 0.3s ease;
}

nav a:hover {
  color: #C41E3A;
  transform: translateY(-2px);
}

nav a:hover::after {
  width: 100%;
}

/* HAMBURGER */
.menu-toggle {
  font-size: 28px;
  cursor: pointer;
  display: none;
  color: #C41E3A;
  transition: all 0.3s ease;
}

.menu-toggle:hover {
  transform: scale(1.2) rotate(90deg);
}

/* NAV LINKS */
.nav-links {
  display: flex;
  align-items: center;
}

.nav-links a {
  margin-left: 20px;
}

/* MOBILE */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 80px;
    right: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(31,59,111,0.9) 100%);
    flex-direction: column;
    width: 220px;
    display: none;
    padding: 20px;
    border-left: 3px solid #C41E3A;
    backdrop-filter: blur(10px);
    z-index: 1001;
  }

  .nav-links a {
    margin: 10px 0;
  }

  .nav-links.active {
    display: flex;
  }
}

/* TITLE */
.title {
  text-align: center;
  margin-top: 40px;
  position: relative;
  z-index: 1;
  animation: fadeInDown 0.8s ease-out;
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.title h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  background: linear-gradient(135deg, #C41E3A 0%, #1F3B6F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}

.title p {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.8);
  margin-top: 10px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  padding: 60px 40px;
  position: relative;
  z-index: 1;
}

.gallery-item {
  position: relative;
  perspective: 1000px;
  cursor: pointer;
  animation: float 6s ease-in-out infinite;
}

/* STAGGERED FLOATING ANIMATIONS */
.gallery-item:nth-child(1) { animation: float 6s ease-in-out infinite; }
.gallery-item:nth-child(2) { animation: float 6.5s ease-in-out infinite 0.2s; }
.gallery-item:nth-child(3) { animation: float 7s ease-in-out infinite 0.4s; }
.gallery-item:nth-child(4) { animation: float 6.2s ease-in-out infinite 0.6s; }
.gallery-item:nth-child(5) { animation: float 6.8s ease-in-out infinite 0.8s; }
.gallery-item:nth-child(6) { animation: float 6.5s ease-in-out infinite 1s; }
.gallery-item:nth-child(7) { animation: float 7.2s ease-in-out infinite 1.2s; }
.gallery-item:nth-child(8) { animation: float 6.3s ease-in-out infinite 1.4s; }
.gallery-item:nth-child(9) { animation: float 6.9s ease-in-out infinite 1.6s; }

@keyframes float {
  0%, 100% {
    transform: translateY(0px) rotateZ(0deg);
  }
  25% {
    transform: translateY(-20px) rotateZ(2deg);
  }
  50% {
    transform: translateY(-40px) rotateZ(-1deg);
  }
  75% {
    transform: translateY(-15px) rotateZ(1deg);
  }
}

.gallery-item img {
  width: 100%;
  border-radius: 15px;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  display: block;
  user-select: none;
}

.gallery-item:hover img {
  transform: scale(1.1) perspective(1200px) rotateY(5deg);
  box-shadow: 0 25px 60px rgba(196, 30, 58, 0.4);
  filter: brightness(1.1);
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.95);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.lightbox.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox-content {
  position: relative;
  width: 90%;
  max-width: 900px;
  height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox-image {
  max-width: 100%;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 10px;
  box-shadow: 0 0 50px rgba(196, 30, 58, 0.5);
  animation: zoomIn 0.3s ease;
}

@keyframes zoomIn {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 40px;
  color: #C41E3A;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
  z-index: 2001;
  transition: all 0.3s ease;
}

.lightbox-close:hover {
  color: #1F3B6F;
  transform: scale(1.2);
}

.lightbox-prev, .lightbox-next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  padding: 16px;
  margin-top: -22px;
  color: #C41E3A;
  font-weight: bold;
  font-size: 32px;
  transition: 0.3s ease;
  border-radius: 3px;
  user-select: none;
  background-color: rgba(0, 0, 0, 0.5);
  z-index: 2001;
}

.lightbox-prev {
  left: 10px;
}

.lightbox-next {
  right: 10px;
}

.lightbox-prev:hover, .lightbox-next:hover {
  background-color: rgba(196, 30, 58, 0.8);
  color: #fff;
  transform: scale(1.15);
}

@media (max-width: 768px) {
  .gallery {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    padding: 40px 20px;
  }

  .lightbox-prev, .lightbox-next {
    padding: 12px;
    font-size: 24px;
  }
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <div>
    <img src="hlogo.png" alt="Logo">
    <h2 style="margin:0;">Shangri-La View Hotel</h2>
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </div>
</nav>

<!-- TITLE -->
<div class="title">
  <h1>Our Gallery</h1>
  <p>Explore the beauty of Shangri-La View Hotel</p>
</div>

<!-- GALLERY -->
<div class="gallery">
  <div class="gallery-item" onclick="openLightbox(0)"><img src="hotelEN.jpg" alt="Hotel Entrance"></div>
  <div class="gallery-item" onclick="openLightbox(1)"><img src="hotel4.JPG" alt="Hotel View 4"></div>
  <div class="gallery-item" onclick="openLightbox(2)"><img src="hotel5.JPG" alt="Hotel View 5"></div>
  <div class="gallery-item" onclick="openLightbox(3)"><img src="hotel7.JPG" alt="Hotel View 7"></div>
  <div class="gallery-item" onclick="openLightbox(4)"><img src="hotel8.JPG" alt="Hotel View 8"></div>
  <div class="gallery-item" onclick="openLightbox(5)"><img src="hotel10.JPG" alt="Hotel View 10"></div>
  <div class="gallery-item" onclick="openLightbox(6)"><img src="hlogo.png" alt="Hotel Logo"></div>
  <div class="gallery-item" onclick="openLightbox(7)"><img src="hotel14.JPG" alt="Hotel View 14"></div>
  <div class="gallery-item" onclick="openLightbox(8)"><img src="hotelFVV.jpg" alt="Hotel FVV"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <div class="lightbox-content">
    <img id="lightboxImage" class="lightbox-image" src="" alt="Enlarged image">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    <a class="lightbox-prev" onclick="prevImage()">&#10094;</a>
    <a class="lightbox-next" onclick="nextImage()">&#10095;</a>
  </div>
</div>

<!-- SCRIPT -->
<script>
function toggleMenu() {
  const navLinks = document.getElementById("navLinks");
  navLinks.classList.toggle("active");
}

// Close menu when a link is clicked
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById("navLinks").classList.remove("active");
  });
});

/* LIGHTBOX FUNCTIONALITY */
const lightbox = document.getElementById('lightbox');
const lightboxImage = document.getElementById('lightboxImage');
const galleryItems = document.querySelectorAll('.gallery-item img');
const images = [];

// Get all image sources
galleryItems.forEach(img => {
  images.push(img.src);
});

let currentImageIndex = 0;

function openLightbox(index) {
  currentImageIndex = index;
  lightboxImage.src = images[currentImageIndex];
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = 'auto';
}

function nextImage() {
  currentImageIndex = (currentImageIndex + 1) % images.length;
  lightboxImage.src = images[currentImageIndex];
}

function prevImage() {
  currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
  lightboxImage.src = images[currentImageIndex];
}

// Close lightbox on background click
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    closeLightbox();
  }
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (lightbox.classList.contains('active')) {
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'Escape') closeLightbox();
  }
});
</script>

</body>
  </html>
